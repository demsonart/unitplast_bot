# UNITPLAST Bot - Nginx Configuration
# Domain: unitgroup.tech
# IP: 193.104.33.29

upstream unitplast_app {
    server 127.0.0.1:5000;
}

# Redirect www to non-www
server {
    listen 80;
    listen [::]:80;
    server_name www.unitgroup.tech;
    return 301 http://unitgroup.tech$request_uri;
}

# Main HTTP server (will be redirected to HTTPS by certbot)
server {
    listen 80;
    listen [::]:80;
    server_name unitgroup.tech;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server (added by certbot)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name unitgroup.tech;

    # SSL certificates (added by certbot)
    # ssl_certificate /etc/letsencrypt/live/unitgroup.tech/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/unitgroup.tech/privkey.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Logging
    access_log /var/log/nginx/unitgroup.tech.access.log;
    error_log /var/log/nginx/unitgroup.tech.error.log;

    # Client upload size
    client_max_body_size 10M;

    # Main proxy to Flask app
    location / {
        proxy_pass http://unitplast_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 120s;
    }

    # Health check endpoint (no logging)
    location = /health {
        proxy_pass http://unitplast_app;
        access_log off;
    }

    # Static files (if needed)
    location /static/ {
        alias /var/www/unitplast_bot/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

# Redirect www HTTPS to non-www
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.unitgroup.tech;

    # SSL certificates
    # ssl_certificate /etc/letsencrypt/live/unitgroup.tech/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/unitgroup.tech/privkey.pem;

    return 301 https://unitgroup.tech$request_uri;
}
