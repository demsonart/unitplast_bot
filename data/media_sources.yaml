# Скоринг новостей (ИНФОРМАЦИОННЫЙ ФОРМАТ)
scoring:
  rules:
    relevant_to_manufacturing: 3
    relates_to_content_category: 3
    explains_value_for_smb: 2
    has_visual_or_generatable: 2
    fresh_news: 1
    is_pure_ad: -5
    no_source: -5
    unsafe_to_use: -5
    no_manufacturing_connection: -5
    unverifiable_fact: -5
    contains_hard_cta: -5
    sales_pitch_tone: -3
  min_score: 6
  reject_score_below: 6

# Политика контента (ИНФОРМАЦИОННЫЙ КАНАЛ)
content_policy:
  max_word_count_from_source: 25
  require_source_attribution: true
  require_approval_before_publish: true
  allow_ai_generated_visual: true
  no_direct_image_copy: true
  rewrite_policy: "не копировать, переписать своими словами"

  # ОБЯЗАТЕЛЬНО использовать МЯГКИЕ CTA только
  soft_cta_required: true
  hard_cta_forbidden: true
  hard_cta_examples_forbidden:
    - "Открыть Mini App"
    - "Получить КП"
    - "Рассчитать заказ"
    - "Получить демо"
    - "Попробовать калькулятор"
    - "Запросить КП"
    - "Оставить заявку на расчёт"
    - "Узнать стоимость"
    - "Зарегистрируйся в app"
    - "Используй наш сервис"

  soft_cta_examples_allowed:
    - "Подписаться на @UnitgroupAI"
    - "Сохранить идею"
    - "Написать, какую тему разобрать"
    - "Выбрать тему следующего поста"
    - "Оставить мнение в комментариях"
    - "Написать, какой станок разобрать"
    - "Написать, какая ниша интересна"
    - "Поделиться советом"
    - "Дать рекомендацию"

  # Правильные бренды (ДОЛЖНЫ БЫТЬ ПРАВИЛЬНЫЕ)
  brands_required:
    - UNITGROUP
    - UNITPLAST
    - UNITFURNITURE (NOT UNIFURNITURE)
    - UNITMETALL (NOT UNIMETALL)

  # Категории контента
  content_categories:
    - manufacturing_news (25%)
    - business_ideas (20%)
    - machinery_equipment (20%)
    - materials_technologies (15%)
    - trends_forecasts (10%)

# Статусы постов
post_statuses:
  - draft
  - needs_review
  - approved
  - published
  - failed
  - blocked
  - rejected_low_score
