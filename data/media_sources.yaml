# Скоринг новостей
scoring:
  rules:
    has_equipment: 3
    relates_to_unitmodule: 3
    explains_value_for_smb: 2
    has_visual_or_generatable: 2
    fresh_news: 1
    is_pure_ad: -5
    no_source: -5
    unsafe_to_use: -5
    no_manufacturing_connection: -5
    unverifiable_fact: -5
  min_score: 6
  reject_score_below: 6

# Политика контента
content_policy:
  max_word_count_from_source: 25
  require_source_attribution: true
  require_approval_before_publish: true
  allow_ai_generated_visual: true
  no_direct_image_copy: true
  rewrite_policy: "не копировать, переписать своими словами"
  brands_required:
    - UNITGROUP
    - UNITPLAST
    - UNITFURNITURE
    - UNITMETALL

# Статусы постов
post_statuses:
  - draft
  - needs_review
  - approved
  - published
  - failed
  - blocked
  - rejected_low_score
