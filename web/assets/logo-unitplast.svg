<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .hexagon { fill: none; stroke: #FF6B35; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .hex-mid { opacity: 0.7; }
      .hex-inner { opacity: 0.4; }
    </style>
  </defs>
  <!-- Outer hexagon -->
  <path class="hexagon" d="M 50 20 L 70 30 L 70 50 L 50 60 L 30 50 L 30 30 Z"/>
  <!-- Middle hexagon -->
  <path class="hexagon hex-mid" d="M 50 28 L 66 37 L 66 47 L 50 53 L 34 47 L 34 37 Z"/>
  <!-- Inner hexagon -->
  <path class="hexagon hex-inner" d="M 50 34 L 62 41 L 62 47 L 50 51 L 38 47 L 38 41 Z"/>
</svg>