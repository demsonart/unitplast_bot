<svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
  <!-- FEATURE ICONS (6 шт) -->

  <!-- Analytics icon -->
  <symbol id="icon-analytics" viewBox="0 0 64 64">
    <rect x="12" y="40" width="8" height="16" fill="#0066CC" rx="2"/>
    <rect x="28" y="24" width="8" height="32" fill="#0066CC" rx="2"/>
    <rect x="44" y="32" width="8" height="24" fill="#0066CC" rx="2"/>
    <line x1="8" y1="56" x2="56" y2="56" stroke="#E8E8E8" stroke-width="2"/>
  </symbol>

  <!-- Documents/Proposals icon -->
  <symbol id="icon-proposals" viewBox="0 0 64 64">
    <rect x="14" y="10" width="36" height="44" fill="none" stroke="#C85A00" stroke-width="2" rx="2"/>
    <line x1="20" y1="24" x2="44" y2="24" stroke="#C85A00" stroke-width="2"/>
    <line x1="20" y1="32" x2="44" y2="32" stroke="#C85A00" stroke-width="2"/>
    <line x1="20" y1="40" x2="36" y2="40" stroke="#C85A00" stroke-width="2"/>
  </symbol>

  <!-- Orders/Tasks icon -->
  <symbol id="icon-orders" viewBox="0 0 64 64">
    <rect x="12" y="14" width="40" height="36" fill="none" stroke="#5A5A5A" stroke-width="2" rx="2"/>
    <line x1="12" y1="22" x2="52" y2="22" stroke="#5A5A5A" stroke-width="2"/>
    <circle cx="18" cy="32" r="2" fill="#5A5A5A"/>
    <line x1="24" y1="30" x2="44" y2="30" stroke="#5A5A5A" stroke-width="2"/>
    <circle cx="18" cy="42" r="2" fill="#5A5A5A"/>
    <line x1="24" y1="40" x2="44" y2="40" stroke="#5A5A5A" stroke-width="2"/>
  </symbol>

  <!-- Integrations icon -->
  <symbol id="icon-integrations" viewBox="0 0 64 64">
    <circle cx="20" cy="20" r="8" fill="none" stroke="#0066CC" stroke-width="2"/>
    <circle cx="44" cy="20" r="8" fill="none" stroke="#0066CC" stroke-width="2"/>
    <circle cx="20" cy="44" r="8" fill="none" stroke="#0066CC" stroke-width="2"/>
    <circle cx="44" cy="44" r="8" fill="none" stroke="#0066CC" stroke-width="2"/>
    <line x1="28" y1="20" x2="36" y2="20" stroke="#0066CC" stroke-width="2"/>
    <line x1="20" y1="28" x2="20" y2="36" stroke="#0066CC" stroke-width="2"/>
    <line x1="44" y1="28" x2="44" y2="36" stroke="#0066CC" stroke-width="2"/>
  </symbol>

  <!-- Tools/Support icon -->
  <symbol id="icon-support" viewBox="0 0 64 64">
    <path d="M 32 12 Q 44 12 44 24 Q 44 32 38 36 Q 40 40 44 44 L 38 50 Q 32 46 32 46 Q 20 46 20 36 Q 14 32 14 24 Q 14 12 32 12 Z" fill="none" stroke="#C85A00" stroke-width="2"/>
    <circle cx="32" cy="28" r="3" fill="#C85A00"/>
  </symbol>

  <!-- Team/Users icon -->
  <symbol id="icon-team" viewBox="0 0 64 64">
    <circle cx="32" cy="18" r="6" fill="#5A5A5A"/>
    <path d="M 18 32 Q 18 26 24 26 Q 30 26 32 30 Q 34 26 40 26 Q 46 26 46 32 L 46 44 Q 46 48 42 48 L 22 48 Q 18 48 18 44 Z" fill="none" stroke="#5A5A5A" stroke-width="2"/>
  </symbol>

  <!-- BRAND ICONS (3 шт) -->

  <!-- UNITPLAST - Plastic droplet -->
  <symbol id="icon-plastic" viewBox="0 0 64 64">
    <path d="M 32 10 Q 38 20 38 30 Q 38 42 32 50 Q 26 42 26 30 Q 26 20 32 10 Z" fill="none" stroke="#0066CC" stroke-width="2.5"/>
    <circle cx="32" cy="26" r="3" fill="#0066CC"/>
  </symbol>

  <!-- UNIFURNITURE - Wood grain -->
  <symbol id="icon-furniture" viewBox="0 0 64 64">
    <rect x="16" y="14" width="32" height="36" fill="none" stroke="#C85A00" stroke-width="2" rx="2"/>
    <line x1="20" y1="20" x2="44" y2="20" stroke="#C85A00" stroke-width="1.5"/>
    <line x1="18" y1="28" x2="46" y2="28" stroke="#C85A00" stroke-width="1.5"/>
    <line x1="20" y1="36" x2="44" y2="36" stroke="#C85A00" stroke-width="1.5"/>
    <line x1="18" y1="44" x2="46" y2="44" stroke="#C85A00" stroke-width="1.5"/>
  </symbol>

  <!-- UNIMETALL - Metal grid -->
  <symbol id="icon-metall" viewBox="0 0 64 64">
    <rect x="14" y="14" width="36" height="36" fill="none" stroke="#5A5A5A" stroke-width="2"/>
    <line x1="14" y1="24" x2="50" y2="24" stroke="#5A5A5A" stroke-width="1"/>
    <line x1="14" y1="34" x2="50" y2="34" stroke="#5A5A5A" stroke-width="1"/>
    <line x1="14" y1="44" x2="50" y2="44" stroke="#5A5A5A" stroke-width="1"/>
    <line x1="24" y1="14" x2="24" y2="50" stroke="#5A5A5A" stroke-width="1"/>
    <line x1="34" y1="14" x2="34" y2="50" stroke="#5A5A5A" stroke-width="1"/>
    <line x1="44" y1="14" x2="44" y2="50" stroke="#5A5A5A" stroke-width="1"/>
  </symbol>

  <!-- CTA ICONS -->

  <!-- Start/Play -->
  <symbol id="icon-start" viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="28" fill="none" stroke="#FF6B35" stroke-width="2"/>
    <polygon points="26,22 26,42 40,32" fill="#FF6B35"/>
  </symbol>

  <!-- Learn more -->
  <symbol id="icon-learn" viewBox="0 0 64 64">
    <path d="M 16 32 L 32 16 L 48 32 L 44 32 L 44 44 Q 44 48 40 48 L 24 48 Q 20 48 20 44 L 20 32 Z" fill="none" stroke="#0066CC" stroke-width="2"/>
  </symbol>

  <!-- Download -->
  <symbol id="icon-download" viewBox="0 0 64 64">
    <line x1="32" y1="12" x2="32" y2="40" stroke="#FF6B35" stroke-width="2"/>
    <polygon points="32,40 20,28 44,28" fill="#FF6B35"/>
    <line x1="16" y1="48" x2="48" y2="48" stroke="#FF6B35" stroke-width="2"/>
  </symbol>

  <!-- CONTACT ICONS -->

  <!-- Phone -->
  <symbol id="icon-phone" viewBox="0 0 64 64">
    <rect x="18" y="12" width="28" height="40" fill="none" stroke="#FF6B35" stroke-width="2" rx="3"/>
    <circle cx="32" cy="48" r="2" fill="#FF6B35"/>
  </symbol>

  <!-- Email -->
  <symbol id="icon-email" viewBox="0 0 64 64">
    <rect x="14" y="18" width="36" height="28" fill="none" stroke="#0066CC" stroke-width="2" rx="2"/>
    <path d="M 14 18 L 32 32 L 50 18" fill="none" stroke="#0066CC" stroke-width="2"/>
  </symbol>

  <!-- Location -->
  <symbol id="icon-location" viewBox="0 0 64 64">
    <path d="M 32 10 Q 24 10 20 16 Q 16 22 16 30 Q 16 42 32 54 Q 48 42 48 30 Q 48 22 44 16 Q 40 10 32 10 Z" fill="none" stroke="#C85A00" stroke-width="2"/>
    <circle cx="32" cy="30" r="4" fill="#C85A00"/>
  </symbol>

  <!-- Messenger/Chat -->
  <symbol id="icon-messenger" viewBox="0 0 64 64">
    <path d="M 14 20 Q 14 16 18 16 L 46 16 Q 50 16 50 20 L 50 38 Q 50 42 46 42 L 32 42 L 22 50 L 24 42 L 18 42 Q 14 42 14 38 Z" fill="none" stroke="#5A5A5A" stroke-width="2"/>
  </symbol>
</svg>
