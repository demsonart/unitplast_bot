<svg viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- UNIMETALL (серебристый/металл) -->
  <g>
    <!-- Outer hexagon -->
    <path d="M 30 35 L 42 28 L 54 35 L 54 50 L 42 57 L 30 50 Z"
          fill="none" stroke="#5A5A5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Middle hexagon -->
    <path d="M 32 40 L 42 35 L 52 40 L 52 48 L 42 53 L 32 48 Z"
          fill="none" stroke="#5A5A5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
    <!-- Inner hexagon -->
    <path d="M 34 43 L 42 40 L 50 43 L 50 46 L 42 49 L 34 46 Z"
          fill="none" stroke="#5A5A5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
  </g>

  <!-- UNITPLAST (оранжевый) -->
  <g>
    <!-- Outer hexagon -->
    <path d="M 90 35 L 102 28 L 114 35 L 114 50 L 102 57 L 90 50 Z"
          fill="none" stroke="#FF6B35" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Middle hexagon -->
    <path d="M 92 40 L 102 35 L 112 40 L 112 48 L 102 53 L 92 48 Z"
          fill="none" stroke="#FF6B35" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
    <!-- Inner hexagon -->
    <path d="M 94 43 L 102 40 L 110 43 L 110 46 L 102 49 L 94 46 Z"
          fill="none" stroke="#FF6B35" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
  </g>

  <!-- UNIFURNITURE (зелёный) -->
  <g>
    <!-- Outer hexagon -->
    <path d="M 150 35 L 162 28 L 174 35 L 174 50 L 162 57 L 150 50 Z"
          fill="none" stroke="#10b981" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Middle hexagon -->
    <path d="M 152 40 L 162 35 L 172 40 L 172 48 L 162 53 L 152 48 Z"
          fill="none" stroke="#10b981" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
    <!-- Inner hexagon -->
    <path d="M 154 43 L 162 40 L 170 43 L 170 46 L 162 49 L 154 46 Z"
          fill="none" stroke="#10b981" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
  </g>

  <!-- Text UNITGROUP -->
  <text x="210" y="48" font-family="'IBM Plex Serif', serif" font-size="32" font-weight="700" fill="#1a1a1a">UNITGROUP</text>
  <text x="210" y="62" font-family="'Inter', sans-serif" font-size="10" font-weight="500" fill="#666666" letter-spacing="2">ПЛАСТИК · МЕБЕЛЬ · МЕТАЛЛ</text>
</svg>
